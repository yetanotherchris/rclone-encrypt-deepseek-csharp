name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            suffix: linux-amd64
          - os: ubuntu-latest
            rid: linux-arm64
            suffix: linux-arm64
          - os: macos-latest
            rid: osx-x64
            suffix: darwin-amd64
          - os: macos-latest
            rid: osx-arm64
            suffix: darwin-arm64
          - os: windows-latest
            rid: win-x64
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0"
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Restore
        run: dotnet restore
      - name: Build (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          dotnet publish src/rclone-encrypt-deepseek-csharp/rclone-encrypt-deepseek-csharp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:DebugType=embedded -o publish
          mv publish/rclone-encrypt-deepseek-csharp publish/rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}
          tar czf rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}.tar.gz -C publish rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}
      - name: Build (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet publish src/rclone-encrypt-deepseek-csharp/rclone-encrypt-deepseek-csharp.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:DebugType=embedded -o publish
          Compress-Archive -Path publish\* -DestinationPath rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}.zip -Force
      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}
          path: rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}.tar.gz
      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rclone-encrypt-deepseek-csharp-windows-amd64
          path: rclone-encrypt-deepseek-csharp-${{ matrix.suffix }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main
      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Update Brew formula
        shell: pwsh
        run: ./updatebrew.ps1 -Version ${{ steps.version.outputs.VERSION }}
      - name: Commit updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update package manifests to ${{ github.ref_name }}"
          file_pattern: "rclone-encrypt-deepseek-csharp.json Formula/rclone-encrypt-deepseek-csharp.rb"
